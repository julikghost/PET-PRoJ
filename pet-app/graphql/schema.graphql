"""
PET logistics — GraphQL contract aligned with the PET UI data model (`src/types/petLogistics.ts`).

- **Points → pet ships → bookings** live in `localStorage` key `pet-logistics-v1` (demo).
- **Dog daycare** keeps an internal daycare booking (`bookingRefCode`, `startDate`, `endDate`) and does not depend on Booking records.
- **Pet seaters** are stored in the same key and can be optionally assigned to daycare rows.
- **Pet movers** directory uses `pet-movers-v1` (name, code, active, movement type **shipping** vs **taxi**, tariff `currency`, optional `cars` / `drivers`).
- **City Taxi** (`/city-taxi`): intra-city address-to-address transport (cats/dogs, EUR-only tariffs); PetShipping uses movers with type **shipping** only.
- Pet ship **currency** matches the selected Pet Mover; **cars** / **drivers** are copied from that mover when the ship is saved (snapshot on the ship).
- Booking **petLabels** are **species** names (English catalog), not pet names.
- **Billing** on bookings is derived from the pet ship tariff for Reports (`cur-eur` / `cur-usd` mapping).
- Reports email mutation matches `ReportsPage` and Playwright (`EmailTicketsReport`).
"""
schema {
  query: Query
  mutation: Mutation
}

# --- Shared enums ---

"""EUR / USD base rates for pricing (pet ship + booking snapshot)."""
enum TariffCurrency {
  EUR
  USD
}

enum PetShipStatus {
  PLANNED
  ACTIVE
  DONE
}

"""Same semantics as UI / reports options: `card`, `cash`, `petpay`."""
enum BookingPaymentMethod {
  CARD
  CASH
  PETPAY
}

"""Reports filter currency ids: `cur-eur`, `cur-usd` (JSON) ↔ enum in API layer."""
enum BillingCurrency {
  CUR_EUR
  CUR_USD
}

enum NetworkPointKind {
  HUB
  STOP
  AIRPORT
}

"""
UI values: `scheduled`, `checked-in`, `active`, `checked-out`.
Enum maps kebab-case values to GraphQL-safe names.
"""
enum DogDaycareStatus {
  SCHEDULED
  CHECKED_IN
  ACTIVE
  CHECKED_OUT
}

"""Pet mover serves either network shipping (PetShipping) or city taxi — mutually exclusive."""
enum PetMoverMovementType {
  SHIPPING
  TAXI
}

# --- Read models ---

type Query {
  """Health / portfolio stub."""
  _petHealth: String!
  points: [NetworkPoint!]!
  petMovers: [PetMover!]!
  petShips: [PetShip!]!
  bookings: [PetBooking!]!
  dogDaycares: [DogDaycare!]!
  petSeaters: [PetSeater!]!
  petShip(id: ID!): PetShip
  networkPoint(id: ID!): NetworkPoint
  petMover(id: ID!): PetMover
  dogDaycare(id: ID!): DogDaycare
  petSeater(id: ID!): PetSeater
}

type NetworkPoint {
  id: ID!
  code: String!
  name: String!
  city: String!
  kind: NetworkPointKind!
}

"""Pet mover directory (PetAdmin). Tariff currency applies to new/updated pet ships."""
type PetMover {
  id: ID!
  name: String!
  code: String!
  active: Boolean!
  movementType: PetMoverMovementType!
  currency: TariffCurrency!
  """Optional free text; copied onto pet ships when saved."""
  cars: String
  drivers: String
}

type PetShip {
  id: ID!
  refCode: String!
  fromPoint: NetworkPoint!
  toPoint: NetworkPoint!
  departure: String!
  arrival: String!
  """Display name of the mover (matches `PetMover.name` in the directory)."""
  petMover: String!
  currency: TariffCurrency!
  """Snapshot from Pet Mover at save; omit if empty."""
  cars: String
  drivers: String
  status: PetShipStatus!
}

type PetBooking {
  id: ID!
  refCode: String!
  petShip: PetShip!
  date: String!
  clientFirstName: String!
  clientLastName: String!
  """Species labels (English), from booking catalog."""
  petLabels: [String!]!
  weightKg: Float!
  price: Float!
  currency: TariffCurrency!
  paymentMethod: BookingPaymentMethod!
  billingCurrency: BillingCurrency!
}

type PetSeater {
  id: ID!
  code: String!
  name: String!
  phone: String!
  active: Boolean!
}

type DogDaycare {
  id: ID!
  refCode: String!
  """Internal daycare booking reference (independent from Booking module)."""
  bookingRefCode: String!
  startDate: String!
  endDate: String!
  clientFirstName: String!
  clientLastName: String!
  dogName: String!
  breed: String!
  ageYears: Int!
  ageMonths: Int!
  hoursPerDay: Int!
  status: DogDaycareStatus!
  """Optional relation to pet sitter directory."""
  petSeater: PetSeater
  """Optional uploaded pet photo (base64 data URL)."""
  petPhotoUrl: String
  """Snapshot for table rendering; empty string when unassigned."""
  petSeaterName: String!
  notes: String!
  price: Float!
  currency: TariffCurrency!
}

# --- Writes (intended backend shape) ---

type Mutation {
  emailTicketsReport(req: EmailTicketsReportReq!): EmailTicketsReportPayload!

  createNetworkPoint(input: NetworkPointInput!): NetworkPointMutationPayload!
  updateNetworkPoint(id: ID!, input: NetworkPointInput!): NetworkPointMutationPayload!
  deleteNetworkPoint(id: ID!): NetworkPointMutationPayload!

  createPetMover(input: PetMoverInput!): PetMoverMutationPayload!
  updatePetMover(id: ID!, input: PetMoverInput!): PetMoverMutationPayload!
  deletePetMover(id: ID!): PetMoverMutationPayload!

  createPetShip(input: PetShipInput!): PetShipMutationPayload!
  updatePetShip(id: ID!, input: PetShipInput!): PetShipMutationPayload!
  deletePetShip(id: ID!): PetShipMutationPayload!

  createPetBooking(input: PetBookingInput!): PetBookingMutationPayload!
  updatePetBooking(id: ID!, input: PetBookingInput!): PetBookingMutationPayload!
  deletePetBooking(id: ID!): PetBookingMutationPayload!

  createPetSeater(input: PetSeaterInput!): PetSeaterMutationPayload!
  updatePetSeater(id: ID!, input: PetSeaterInput!): PetSeaterMutationPayload!
  deletePetSeater(id: ID!): PetSeaterMutationPayload!

  createDogDaycare(input: DogDaycareInput!): DogDaycareMutationPayload!
  updateDogDaycare(id: ID!, input: DogDaycareInput!): DogDaycareMutationPayload!
  deleteDogDaycare(id: ID!): DogDaycareMutationPayload!
}

input NetworkPointInput {
  code: String!
  name: String!
  city: String!
  kind: NetworkPointKind!
}

input PetMoverInput {
  name: String!
  code: String!
  active: Boolean!
  movementType: PetMoverMovementType!
  currency: TariffCurrency!
  cars: String
  drivers: String
}

input PetShipInput {
  refCode: String!
  fromPointId: ID!
  toPointId: ID!
  departure: String!
  arrival: String!
  petMover: String!
  currency: TariffCurrency!
  cars: String
  drivers: String
  status: PetShipStatus!
}

input PetBookingInput {
  refCode: String!
  petShipId: ID!
  date: String!
  clientFirstName: String!
  clientLastName: String!
  petLabels: [String!]!
  weightKg: Float!
  paymentMethod: BookingPaymentMethod!
}

input PetSeaterInput {
  code: String!
  name: String!
  phone: String
  active: Boolean!
}

input DogDaycareInput {
  refCode: String!
  bookingRefCode: String!
  startDate: String!
  endDate: String!
  clientFirstName: String!
  clientLastName: String!
  dogName: String!
  breed: String!
  ageYears: Int!
  ageMonths: Int!
  hoursPerDay: Int!
  status: DogDaycareStatus!
  """Optional assignment."""
  petSeaterId: ID
  """Optional uploaded pet photo (base64 data URL)."""
  petPhotoUrl: String
  notes: String
  currency: TariffCurrency!
}

type NetworkPointMutationPayload {
  ok: Boolean!
  point: NetworkPoint
  error: String
}

type PetMoverMutationPayload {
  ok: Boolean!
  petMover: PetMover
  error: String
}

type PetShipMutationPayload {
  ok: Boolean!
  petShip: PetShip
  error: String
}

type PetBookingMutationPayload {
  ok: Boolean!
  booking: PetBooking
  error: String
}

type PetSeaterMutationPayload {
  ok: Boolean!
  petSeater: PetSeater
  error: String
}

type DogDaycareMutationPayload {
  ok: Boolean!
  dogDaycare: DogDaycare
  error: String
}

# --- Reports (existing) ---

input EmailTicketsReportReq {
  paymentType: [String!]
  targetColumnForDateSearch: String!
  fromDate: String!
  toDate: String!
  petMoverIds: [ID!]!
  emailForSendReport: String!
  currency: [String!]
}

type EmailTicketsReportPayload {
  ok: Boolean!
}
