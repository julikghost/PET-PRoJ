# Docker-only Playwright E2E: PET UI (`pet-app`) + контейнер `mcr.microsoft.com/playwright`.
# Матрица по `tests/logistics/*.spec.ts` — новые спеки подхватываются автоматически.
#
# Локально (как в CI): docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e
#
# Креды в CI: Settings → Secrets and variables → Actions → Repository secrets.
# Имена совпадают с переменными из корневого `.env` / `.env.example` (LOGISTICS_*).
# Если секрет не задан, Compose берёт значения по умолчанию из `docker-compose.e2e.yml` (${VAR:-…}).
# У форков PR секреты недоступны — подставятся те же дефолты.

name: E2E (Docker)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  e2e-matrix-prep:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - uses: actions/checkout@v6

      - id: set
        name: Discover specs (tests/logistics/*.spec.ts)
        run: |
          set -euo pipefail
          if [ ! -d tests/logistics ]; then
            echo '::error::tests/logistics not found'
            exit 1
          fi
          node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const path = require('path');

          const outPath = process.env.GITHUB_OUTPUT;
          if (!outPath) {
            console.error('GITHUB_OUTPUT is not set');
            process.exit(1);
          }

          const dir = path.join(process.cwd(), 'tests', 'logistics');
          const include = fs
            .readdirSync(dir)
            .filter((f) => f.endsWith('.spec.ts'))
            .sort()
            .map((f) => ({
              name: f.replace(/\.spec\.ts$/, ''),
              spec: path.posix.join('tests', 'logistics', f),
            }));

          if (include.length === 0) {
            console.error('No tests/logistics/*.spec.ts files');
            process.exit(1);
          }

          const json = JSON.stringify(include);
          const delim = `MATRIX_${crypto.randomBytes(16).toString('hex')}`;
          fs.appendFileSync(outPath, `include<<${delim}\n${json}\n${delim}\n`);
          NODE

  e2e-docker:
    needs: e2e-matrix-prep
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      # Проброс в `docker compose` для build-args `pet-app` и env сервиса `e2e` (см. docker-compose.e2e.yml).
      LOGISTICS_UI_USER_NAME: ${{ secrets.LOGISTICS_UI_USER_NAME }}
      LOGISTICS_PASSWORD: ${{ secrets.LOGISTICS_PASSWORD }}
      LOGISTICS_ADMIN_USER_NAME: ${{ secrets.LOGISTICS_ADMIN_USER_NAME }}
      LOGISTICS_ADMIN_PASSWORD: ${{ secrets.LOGISTICS_ADMIN_PASSWORD }}
      LOGISTICS_ACCOUNTANT_USER_NAME: ${{ secrets.LOGISTICS_ACCOUNTANT_USER_NAME }}
      LOGISTICS_ACCOUNTANT_PASSWORD: ${{ secrets.LOGISTICS_ACCOUNTANT_PASSWORD }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJson(needs.e2e-matrix-prep.outputs.include) }}

    name: E2E Docker / ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Build PET UI (pet-app) image
        run: docker compose -f docker-compose.e2e.yml build pet-app

      - name: Run Playwright E2E (PET UI + tests in Docker)
        env:
          E2E_PLAYWRIGHT_SPEC: ${{ matrix.spec }}
        run: >
          docker compose -f docker-compose.e2e.yml up
          --no-build
          --abort-on-container-exit
          --exit-code-from e2e

      - name: Tear down Compose stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Publish JUnit to GitHub Checks
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && hashFiles('results.xml') != ''
        with:
          files: results.xml
          check_name: E2E Docker / ${{ matrix.name }}
          comment_mode: off

      - name: Upload JUnit (matrix shard)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-junit-${{ matrix.name }}
          path: results.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright report and JUnit
        if: failure()
        id: upload-e2e
        uses: actions/upload-artifact@v7
        with:
          name: e2e-docker-${{ matrix.name }}
          path: |
            results.xml
            test-results
            allure-results
          if-no-files-found: warn

      - name: Job summary — artifact download link
        if: failure() && steps.upload-e2e.outcome == 'success'
        env:
          ARTIFACT_URL: ${{ steps.upload-e2e.outputs.artifact-url }}
        run: |
          {
            echo "### E2E artifacts (${{ matrix.name }})"
            echo ""
            if [ -n "${ARTIFACT_URL:-}" ]; then
              echo "Download trace / screenshots / **results.xml**: [e2e-docker-${{ matrix.name }}.zip](${ARTIFACT_URL})"
            else
              echo "Artifacts uploaded under **e2e-docker-${{ matrix.name }}** — open the job’s **Artifacts** dropdown (ZIP contains \`test-results/\`, traces, screenshots)."
            fi
            echo ""
            echo "Local trace viewer: \`npx playwright show-trace test-results/**/trace.zip\`"
          } >> "$GITHUB_STEP_SUMMARY"
