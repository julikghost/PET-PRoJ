# Один job:
#   checkout → образ PET UI (pull из GHCR или сборка из PR, `e2e-docker-pet-app.sh`)
#   → `docker-compose-e2e.sh up` (pet-app + e2e, полный Playwright: role smoke → session → logistics)
#   → `down` → JUnit в Checks → артефакты при падении (+ results.xml всегда как e2e-junit).
#
# Локально: docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e
#
# Креды: Secrets → Actions (`LOGISTICS_*`). Форки без секретов — дефолты из compose.

name: E2E (Docker)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  packages: read

jobs:
  e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      LOGISTICS_UI_USER_NAME: ${{ secrets.LOGISTICS_UI_USER_NAME }}
      LOGISTICS_PASSWORD: ${{ secrets.LOGISTICS_PASSWORD }}
      LOGISTICS_ADMIN_USER_NAME: ${{ secrets.LOGISTICS_ADMIN_USER_NAME }}
      LOGISTICS_ADMIN_PASSWORD: ${{ secrets.LOGISTICS_ADMIN_PASSWORD }}
      LOGISTICS_ACCOUNTANT_USER_NAME: ${{ secrets.LOGISTICS_ACCOUNTANT_USER_NAME }}
      LOGISTICS_ACCOUNTANT_PASSWORD: ${{ secrets.LOGISTICS_ACCOUNTANT_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: PET UI image — GHCR или сборка из PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/e2e-docker-pet-app.sh

      - name: Playwright E2E (один compose up)
        run: >
          bash .github/scripts/docker-compose-e2e.sh up
          --no-build
          --abort-on-container-exit
          --exit-code-from e2e

      - name: Tear down Compose stack
        if: always()
        run: bash .github/scripts/docker-compose-e2e.sh down -v

      - name: Publish JUnit to GitHub Checks
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && hashFiles('results.xml') != ''
        with:
          files: results.xml
          check_name: E2E (Docker)
          comment_mode: off

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-junit
          path: results.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright artifacts on failure
        if: failure()
        id: upload-e2e
        uses: actions/upload-artifact@v7
        with:
          name: e2e-docker
          path: |
            results.xml
            test-results
            allure-results
          if-no-files-found: warn

      - name: Job summary — artifacts
        if: failure() && steps.upload-e2e.outcome == 'success'
        env:
          ARTIFACT_URL: ${{ steps.upload-e2e.outputs.artifact-url }}
        run: |
          {
            echo "### E2E Docker — артефакты"
            echo ""
            if [ -n "${ARTIFACT_URL:-}" ]; then
              echo "Скачать trace / screenshots / **results.xml**: [e2e-docker.zip](${ARTIFACT_URL})"
            else
              echo "Артефакт **e2e-docker** в списке Artifacts job."
            fi
            echo ""
            echo "Трейсы: \`npx playwright show-trace test-results/**/trace.zip\`"
          } >> "$GITHUB_STEP_SUMMARY"
