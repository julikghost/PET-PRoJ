# Сборка PET UI (`pet-app`) и публикация в GHCR — образ подтягивает E2E (`e2e-docker.yml`) на ветке main.
# Запуски: https://github.com/julikghost/PET-PRoJ/actions/workflows/docker-image.yml

name: Docker Image CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Image name (GHCR, lowercase)
        run: |
          echo "PET_APP_IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/pet-app" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PET UI image
        run: |
          set -euo pipefail
          docker build ./pet-app \
            --tag "${PET_APP_IMAGE_PREFIX}:${GITHUB_SHA}"

      - name: Push SHA tag (always)
        run: docker push "${PET_APP_IMAGE_PREFIX}:${GITHUB_SHA}"

      - name: Push latest (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "${PET_APP_IMAGE_PREFIX}:${GITHUB_SHA}" "${PET_APP_IMAGE_PREFIX}:latest"
          docker push "${PET_APP_IMAGE_PREFIX}:latest"
